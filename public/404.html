<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WhyNotShare</title>
    <script>
        // SPA redirect for GitHub Pages
        var segment = window.location.pathname.split('/').pop() || '';
        if (segment === 'create-room' || segment === 'join-room') {
            window.location.replace(window.location.origin + window.location.pathname.replace(/\/[^\/]+$/, '/') + '?' + segment);
        } else {
            window.location.replace(window.location.origin + window.location.pathname.replace(/\/[^\/]+$/, '/'));
        }
    </script>
</head>
<body>
</body>
</html>
