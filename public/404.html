<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WhyNotShare</title>
    <script>
        // SPA redirect for GitHub Pages
        var pathname = window.location.pathname;
        var hash = window.location.hash;
        var origin = window.location.origin;
        var repoRoot = pathname.indexOf('/whynotshare') !== -1 ? '/whynotshare/' : '/';
        var segment = pathname.split('/').filter(Boolean).pop() || '';

        if (segment === 'create-room') {
            window.location.replace(origin + repoRoot + '?create-room' + hash);
        } else if (segment === 'join-room') {
            window.location.replace(origin + repoRoot + '?join-room' + hash);
        } else if (hash && hash.length > 1) {
            window.location.replace(origin + repoRoot + hash);
        } else {
            window.location.replace(origin + repoRoot);
        }
    </script>
</head>
<body>
</body>
</html>
